# Dependabot for this repository (pyproject [project].name: ai-image-detector).
# Ecosystems match the repo: pip reads ./pyproject.toml only; github-actions bumps pins in
# .github/workflows/*.yml and composite actions under .github/actions/ (e.g. setup-aid-python).
# No npm/Docker ecosystems.
#
# Grouped PRs per ecosystem (few PRs, each may contain many bumps):
# - One PR bundles routine version bumps (`patterns: ["*"]`).
# - One PR bundles security fixes (`applies-to: security-updates`).
# `interval: daily` = at most one check cycle per day per ecosystem; raise `open-pull-requests-limit` if needed.
#
# Pip reads manifests under `/` (`pyproject.toml`). Exact pins live in `requirements.lock*`
# — refresh via the Dependency Updates workflow or CONTRIBUTING.md before merging pip bumps
# when the lock must match CI digests.
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    groups:
      pip-version-updates:
        applies-to: version-updates
        patterns:
          - "*"
      pip-security-updates:
        applies-to: security-updates
        patterns:
          - "*"

  # directory "/" scans `.github/workflows/**` and composite actions under `.github/actions/**`.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    groups:
      actions-version-updates:
        applies-to: version-updates
        patterns:
          - "*"
      actions-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
