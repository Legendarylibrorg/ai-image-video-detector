name: Dependency Updates

on:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Refresh dependency lock
        run: |
          bash scripts/update_deps_lock.sh
          python scripts/update_deps_lock.py verify --require-current

      - name: Run test suite
        run: |
          python -m unittest discover -s tests -p 'test_*.py'

      - name: Create dependency update PR
        uses: peter-evans/create-pull-request@v8
        with:
          branch: codex/dependency-refresh
          commit-message: "chore: refresh locked dependencies"
          title: "chore: refresh locked dependencies"
          body: |
            Regenerates `requirements.lock` / `requirements.lock.json` from `pyproject.toml` and re-runs `update_deps_lock.py verify`.
          labels: dependencies
