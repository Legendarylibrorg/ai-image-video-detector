# Unit tests: same Python as Security Checks / Dependency Updates (see .github/ci-python-version.txt).
# Installs the pipeline profile from requirements.lock via scripts/install_deps.sh, then runs unittest.
name: Tests

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-aid-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unittest:
    name: unittest (pipeline lock)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup CI Python
        id: aid_py
        uses: ./.github/actions/setup-aid-python
        with:
          cache-dependency-path: requirements.lock

      - name: Report CI Python
        run: echo "ci_python_version=${{ steps.aid_py.outputs.python-version }}"

      - name: Install dependencies from lock
        run: bash scripts/install_deps.sh

      - name: Lint with Ruff
        run: |
          .venv/bin/python -m pip install --progress-bar off "ruff==0.9.10"
          .venv/bin/ruff check src/ai_image_detector tests

      - name: Run unit tests
        run: .venv/bin/python -m unittest discover -s tests -p 'test_*.py' -v
