name: smoke

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  smoke-train-resume:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: bash scripts/install_deps.sh
      - name: Unit tests and E2E smoke
        env:
          AID_E2E_SMOKE: "1"
        run: .venv/bin/python -m unittest discover -s tests -p 'test_*.py'
