name: smoke

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  smoke-train-resume:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: bash scripts/install_deps.sh
      - name: Unit Tests
        run: .venv/bin/python -m unittest discover -s tests -p 'test_*.py'
      - name: Smoke
        run: source .venv/bin/activate && bash scripts/smoke_resume_eval.sh
