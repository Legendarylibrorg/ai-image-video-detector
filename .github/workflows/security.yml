name: Security Checks

on:
  pull_request:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.lock

      - name: Install Security Tools
        run: |
          python -m pip install --upgrade pip
          pip install detect-secrets pip-audit

      - name: Verify Locked Dependency Hashes
        run: |
          python scripts/update_deps_lock.py verify --require-current

      - name: Secret Scan
        run: |
          if [ -f .secrets.baseline ]; then
            # requirements.lock.json is generated; digests are public PyPI SHA256 values
            # verified in "Verify Locked Dependency Hashes", not repository secrets.
            git ls-files -z | xargs -0 detect-secrets-hook --baseline .secrets.baseline \
              --exclude-files '^requirements\.lock\.json$'
          else
            detect-secrets scan . > .secrets.baseline
            git diff --exit-code .secrets.baseline
          fi

      - name: Dependency Vulnerability Audit
        run: |
          if [ -f requirements.lock ]; then
            pip-audit -r requirements.lock
          else
            pip-audit
          fi
