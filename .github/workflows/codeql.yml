# Code scanning: Python sources under src/ai_image_detector/ and scripts/*.py only.
# No application JS/TS in-tree; default CodeQL "JS/TS" jobs are noise — use this workflow
# and disable duplicate Default setup (Settings → Code security → Code scanning → CodeQL).
# Schedule: Monday 06:30 UTC (first of the three weekly anchors; see CONTRIBUTING automation table).
name: Code scanning (Python)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "30 6 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

env:
  AID_CI_PYPROJECT_NAME: "ai-image-video-detector"
  AID_CI_IMPORT_PACKAGE: "ai_image_detector"

# CodeQL uploads SARIF; avoid canceling mid-upload on the same ref.
concurrency:
  group: ${{ github.repository }}-aid-codeql-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  analyze:
    name: Analyze (${{ env.AID_CI_IMPORT_PACKAGE }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.36.0
        with:
          languages: python
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4.36.0
