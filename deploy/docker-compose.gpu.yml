services:
  ai-detector:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: ai-detector-4090
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - HOST=127.0.0.1
      - PORT=8000
      - ALLOW_REMOTE_BIND=0
      - UNKNOWN_MARGIN=0.05
      - MAX_BYTES=10485760
      - RATE_LIMIT=300
      - MODEL_GLOB=./artifacts_ens/m*/best.pt
    gpus: all
    volumes:
      - ../artifacts_ens:/app/artifacts_ens
