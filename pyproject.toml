[project]
name = "ai-image-detector"
version = "0.1.0"
description = "Linux pipeline for local AI image and video collection and PyTorch training"
readme = "README.md"
requires-python = ">=3.9"
dependencies = []

[project.optional-dependencies]
inference = [
  "torch>=2.2",
  "torchvision>=0.17",
  "numpy>=1.25",
  "pillow>=10.0",
  "safetensors>=0.4",
]
training = [
  "torch>=2.2",
  "torchvision>=0.17",
  "numpy>=1.25",
  "scikit-learn>=1.3",
  "pillow>=10.0",
  "piexif>=1.1.3",
  "safetensors>=0.4",
]
collection = [
  "datasets>=2.19",
  "huggingface_hub>=0.24",
  "pillow>=10.0",
]
video = [
  "opencv-python-headless>=4.10",
]
pipeline = [
  "torch>=2.2",
  "torchvision>=0.17",
  "numpy>=1.25",
  "scikit-learn>=1.3",
  "pillow>=10.0",
  "piexif>=1.1.3",
  "opencv-python-headless>=4.10",
  "datasets>=2.19",
  "huggingface_hub>=0.24",
  "safetensors>=0.4",
]

[project.scripts]
aid-train = "ai_image_detector.cli:train_main"
aid-video-train = "ai_image_detector.cli:video_train_main"
aid-dataset = "ai_image_detector.cli:dataset_main"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
