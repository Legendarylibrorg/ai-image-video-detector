[project]
name = "ai-image-detector"
version = "0.1.0"
description = "Advanced AI-generated image detector"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
  "torch>=2.2",
  "torchvision>=0.17",
  "numpy>=1.25",
  "pillow>=10.0",
  "piexif>=1.1.3",
  "opencv-python-headless>=4.10",
  "fastapi>=0.111",
  "uvicorn>=0.30",
]

[project.scripts]
aid-train = "ai_image_detector.train:main"
aid-detect = "ai_image_detector.infer:main"
aid-serve = "ai_image_detector.api:main"
aid-metadata = "ai_image_detector.metadata:main"
aid-explain = "ai_image_detector.explain:main"
aid-robust-eval = "ai_image_detector.robust_eval:main"
aid-video-detect = "ai_image_detector.video:main"
aid-video-train = "ai_image_detector.video_temporal:train_main"
aid-video-detect-temporal = "ai_image_detector.video_temporal:infer_main"
aid-dataset = "ai_image_detector.dataset_tools:main"
aid-train-advanced = "ai_image_detector.train:main"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
